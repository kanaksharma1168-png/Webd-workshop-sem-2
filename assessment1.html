<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assessment1.css">
</head>
<body>
    <div class="container">
        <h2>Student Record</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="number" id="rollno" placeholder="Roll NO">
        <input type="number" id="maths" placeholder="Marks in Maths">
        <input type="number" id="science" placeholder="Marks in Science">
        <input type="number" id="english" placeholder="Marks in English">
        <button onclick="addstudent()">Add students</button>
        <button onclick="displaystudent()">Display students</button>
        <button onclick="totalmarks()">Total Marks</button>
        <button onclick="averagemarks()">Average Marks</button>
        <button onclick="above80()">Students score average >=80</button>
        <button onclick="failed()">Failed students</button>
        <button onclick="total_of_students()">Total No of students</button>
    </div>
</body>
</html>
